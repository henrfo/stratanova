<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>People – Strata Nova</title>
  <meta name="description" content="The people behind Strata Nova — backgrounds in cognitive neuroscience, psychology, computer science, and business analytics." />
  <meta property="og:title" content="People – Strata Nova" />
  <meta property="og:description" content="The people behind Strata Nova — backgrounds in cognitive neuroscience, psychology, computer science, and business analytics." />
  <meta property="og:url" content="https://stratanova.no/people" />
  <meta property="og:type" content="website" />

  <!-- Link to main CSS file -->
  <link rel="stylesheet" href="styles/main.css">

  <style>
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* People card grid styles inspired by projects */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 1200px !important;
      margin: 0 auto !important;
      padding: 2rem !important;
      padding-top: 90px !important;
    }

    h1 {
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
    }

    /* People grid - left aligned cards */
    .people-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(300px, 400px));
      gap: 2rem;
      width: 100%;
      justify-content: center;
    }


    .person-card {
      background: rgba(20, 40, 80, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      color: inherit;
      width: 100%;
    }

    .person-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    /* Person profile picture */
    .person-thumbnail {
      width: 100%;
      height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background-color: rgba(20, 30, 60, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .person-thumbnail img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      opacity: 0.95;
    }

    /* Person content */
    .person-content {
      padding: 1.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .person-about {
      margin-top: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .person-about a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .person-about a:hover {
      color: white;
    }

    .person-email {
      margin-top: auto;
      margin-bottom: 0.75rem;
    }

    .person-social {
      margin-top: 0;
    }

    .person-name {
      font-family: 'Exo 2', sans-serif;
      font-size: 1.3rem;
      font-weight: 300;
      margin: 0;
      color: white;
      line-height: 1.4;
    }

    .person-role {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #a9c8e6;
      margin-bottom: 1rem;
      font-weight: 400;
    }

    .person-bio {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #ccc;
      margin-bottom: 1.5rem;
    }

    /* Contact links */
    .person-contact {
      display: block;
      margin-bottom: 1rem;
      text-align: center;
    }

    .person-email {
      font-size: 0.85rem;
      text-align: center;
    }

    .person-email a {
      color: #dfefff;
      text-decoration: none;
    }

    .person-email a:hover {
      color: white;
      text-decoration: underline;
    }

    .person-social {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
    }

    .person-social a {
      color: #ffffff;
      font-size: 1.2rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .person-social a:hover {
      color: #dfefff;
    }

    /* View more link */
    .view-profile {
      display: inline-block;
      color: #dfefff;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.5rem 0;
      transition: color 0.3s ease;
      font-weight: 400;
    }

    .view-profile:hover {
      color: white;
    }

    .view-profile::after {
      content: " →";
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .people-grid {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .person-card {
        max-width: 400px;
        margin: 0 auto;
      }

      .person-social a {
        padding: 10px;
        min-width: 44px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
        letter-spacing: 1px;
      }

      .person-thumbnail img {
        width: 100px;
        height: 100px;
      }

      .person-name {
        font-size: 1.1rem;
      }

      .person-social a {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
