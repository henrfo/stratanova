<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News – Strata Nova</title>
  <meta name="description" content="Updates, talks, and reflections from Strata Nova." />
  <meta property="og:title" content="News – Strata Nova" />
  <meta property="og:description" content="Updates, talks, and reflections from Strata Nova." />
  <meta property="og:url" content="https://stratanova.no/insights" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://stratanova.no/assets/stratanova_logo_symbol_only%20copy_quadratic.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Exo+2:wght@100;200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      color: white;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 120px 1rem 4rem !important;
    }


    /* Feed container */
    .feed {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* Post card */
    .post {
      background: rgba(20, 40, 80, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 1.4rem 1.6rem;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.3s ease;
      text-align: left;
    }

    .post:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .post .date {
      font-size: 0.85rem;
      color: #777;
      margin-bottom: 0.5rem;
    }

    .post h2 {
      font-size: 1.2rem;
      color: #dfefff;
      font-weight: 400;
      margin: 0 0 0.6rem 0;
      text-align: center;
    }

    .post h2 a {
      color: #dfefff;
      text-decoration: none;
    }

    .post h2 a:hover {
      text-decoration: underline;
    }

    .post p {
      color: #bbb;
      line-height: 1.6;
      font-size: 0.95rem;
      margin: 0;
    }

    /* Footer */
    .footer {
      width: 100%;
      padding: 1.5rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      z-index: 1;
    }

    .footer-content {
      width: 80%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
    }

    .footer a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer a:hover {
      color: white;
    }

    @media (max-width: 768px) {
      .content {
        padding: 100px 1rem 2rem 1rem;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 2rem;
      }

      .post h2 {
        font-size: 1.1rem;
      }

      .footer-content {
        flex-direction: column;
        gap: 0.5rem;
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
        letter-spacing: 1px;
      }

      .post .date {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <canvas id="bg"></canvas>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <a href="/">
      <img src="assets/stratanova_logo_symbol_only copy_quadratic.png" alt="Strata Nova symbol" class="logo-nav" />
    </a>
    <ul>
      <li><a href="about">About</a></li>
      <li><a href="people">People</a></li>
      <li><a href="projects">Projects</a></li>
      <li><a href="services">Services</a></li>
      <li><a href="news">News</a></li>
      <li><a href="contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Insights Content -->
  <div class="content">
    <h1>News</h1>
    <div id="insights-posts" class="feed"></div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <div class="copyright">
        &copy; <span id="copyright-year"></span> Strata Nova AS
      </div>
      <div class="contact">
        <a href="mailto:contact@stratanova.no">contact@stratanova.no</a>
      </div>
    </div>
  </footer>
</div>

  <script src="scripts/animation/neuronAnimation.js"></script>
  <script>
    const postsContainer = document.getElementById("insights-posts");

    // Just keeping the one real post
    const linkedInPosts = [
      {
        title: `<a href="https://www.linkedin.com/posts/henrikformoe_10-years-and-a-day-today-i-stood-in-front-activity-7303514521132810240-ZRnS?utm_source=share&utm_medium=member_desktop&rcm=ACoAABi_qQMBL-BUlZfFtRZAqu1rXMmeUOIDtgU" target="_blank" rel="noopener noreferrer">10 Years and a Day</a>`,
        body: "A reflection on representation, growth, and returning to the place where everything started — ten years later. Originally shared on LinkedIn.",
        date: "2025-03-06"
      },
      {
        title: `<a href="https://lnkd.in/dSW6PQKb" target="_blank" rel="noopener noreferrer">Poster Prize at UiO:Life Science</a>`,
        body: "Henrik won the best popular science poster award at the UiO:Life Science Summer Research closing event, October 2025.",
        date: "2025-10-01"
      },
      {
        title: `<a href="https://www.linkedin.com/posts/michelle-ingvaldsen_sapnextgen-sapsuccessfactors-hrtech-activity-7401191459762274304-5wx3/?originalSubdomain=no" target="_blank" rel="noopener noreferrer">Strata Nova at SAP NextGen</a>`,
        body: "Strata Nova's first public presentation — Henrik presented at the final SAP NextGen meeting in November 2025.",
        date: "2025-11-28"
      }
    ];

    linkedInPosts.slice().reverse().forEach(post => {
      const el = document.createElement("div");
      el.className = "post";
      const dateFormatted = new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      el.innerHTML = `
        <div class="date">${dateFormatted}</div>
        <h2>${post.title}</h2>
        <p>${post.body}</p>
      `;
      postsContainer.appendChild(el);
    });
  </script>

<script>
  document.getElementById('copyright-year').textContent = new Date().getFullYear();
</script>

</body>
</html>
